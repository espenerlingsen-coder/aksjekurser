name: Oppdater kursdata

on:
  schedule:
    # Hver ukedag kl. 17:30 UTC (18:30/19:30 norsk tid, etter at Oslo Børs har stengt)
    - cron: "30 17 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  oppdater:
    runs-on: ubuntu-latest
    steps:
      - name: Hent koden
        uses: actions/checkout@v4

      - name: Hent ferske kurser
        shell: pwsh
        run: ./oppdater_data.ps1

      - name: Last opp hvis noe er endret
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.js
          if git diff --staged --quiet; then
            echo "Ingen endringer i kursdata."
          else
            git commit -m "Automatisk oppdatering av kursdata"
            git push
          fi
