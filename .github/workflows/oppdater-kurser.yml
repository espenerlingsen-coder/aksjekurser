name: Oppdater kursdata

on:
  schedule:
    # Hvert 15. minutt på hverdager, kl. 06-15 UTC (dekker Oslo Børs'
    # åpningstid 09:00-16:30 norsk tid, både sommer- og vintertid)
    - cron: "*/15 6-15 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  oppdater:
    runs-on: ubuntu-latest
    steps:
      - name: Hent koden
        uses: actions/checkout@v4

      - name: Hent ferske kurser
        shell: pwsh
        run: ./oppdater_data.ps1

      - name: Last opp hvis noe er endret
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.js
          if git diff --staged --quiet; then
            echo "Ingen endringer i kursdata."
          else
            git commit -m "Automatisk oppdatering av kursdata"
            git push
          fi
